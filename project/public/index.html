<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspicious Activity Detection | AI Security</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-dark);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .upload-section {
            border: 2px dashed #475569;
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 2rem;
        }

        .upload-section:hover {
            border-color: var(--accent);
            background: #1e293b;
        }

        #preview-img {
            max-width: 100%;
            max-height: 400px;
            display: none;
            margin: 1rem auto;
            border-radius: 8px;
            border: 1px solid #475569;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        #results {
            margin-top: 2rem;
            display: none;
            padding: 1.5rem;
            background: #0f172a;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
        }

        .suspicious {
            border-left-color: var(--danger) !important;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 1rem 0;
        }

        .pdf-link {
            display: block;
            margin-top: 1rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚨 Suspicious Activity Detection</h1>
        <p>AI-Powered Visual Threat Analysis</p>
    </header>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p>Click to Upload or Drag & Drop Camera Feed Image</p>
        <input type="file" id="fileInput" hidden accept="image/*">
        <img id="preview-img" src="" alt="Preview">
    </div>

    <button id="analyzeBtn" disabled>Run Analysis</button>

    <div class="loading" id="loader">
        <p>AI Scanning image... Please wait...</p>
    </div>

    <div id="results">
        <h2 id="status-title">Analysis Complete</h2>
        <p><strong>Threat Level:</strong> <span id="threat-type">-</span></p>
        <p><strong>Confidence:</strong> <span id="confidence">-</span>%</p>
        <hr style="border: 0; border-top: 1px solid #334155;">
        <p id="explanation"></p>
        <a id="pdfUrl" class="pdf-link" target="_blank">📄 Download Detailed Incident Report (PDF)</a>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const previewImg = document.getElementById('preview-img');
    const resultsDiv = document.getElementById('results');
    const loader = document.getElementById('loader');

    // Handle Image Preview
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                analyzeBtn.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    // Handle Upload & Analysis
    analyzeBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('leaf', file); // Field name 'leaf' used to match your server code

        // UI States
        analyzeBtn.disabled = true;
        loader.style.display = 'block';
        resultsDiv.style.display = 'none';

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                const report = data.report;
                
                // Update UI with results
                document.getElementById('threat-type').innerText = report.disease; // Maps to classification
                document.getElementById('confidence').innerText = report.confidence;
                document.getElementById('explanation').innerText = report.explanation;
                document.getElementById('pdfUrl').href = data.pdfUrl;

                // Visual styling for suspicious activity
                if (report.disease.toUpperCase().includes('SUSPICIOUS')) {
                    resultsDiv.classList.add('suspicious');
                    document.getElementById('status-title').innerText = "🚨 EMERGENCY / IMMEDIATE ACTION REQUIRED";
                    document.getElementById('status-title').style.color = "#ef4444";
                } else {
                    resultsDiv.classList.remove('suspicious');
                    document.getElementById('status-title').innerText = "✅ Area Clear / No Threat";
                    document.getElementById('status-title').style.color = "#10b981";
                }

                resultsDiv.style.display = 'block';
            } else {
                alert("Error: " + data.error);
            }
        } catch (error) {
            console.error(error);
            alert("Analysis failed. Check server connection.");
        } finally {
            loader.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
